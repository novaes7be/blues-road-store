<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blues Road Store</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">LOGO</div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <h1>Blues & Estrada</h1>
  <p>Sinta a liberdade da estrada</p>
</section>

<section class="filter">

    <option value="default">Ordenar</option>
    <option value="low">Menor preço</option>
    <option value="high">Maior preço</option>
  </select>
</section>

<section class="products" id="products">

    <div class="card-content">
      <h3>Jaqueta Road</h3>
      <p class="price">R$ 299,00</p>
      <button class="btn">Comprar</button>
    </div>
  </div>

  <div class="card" data-price="199">
    <img src="https://images.unsplash.com/photo-1520975922284-9d8d9cba3b39?w=800&auto=format&fit=crop">

      <h3>Bota Vintage</h3>
      <p class="price">R$ 199,00</p>
      <button class="btn">Comprar</button>

      <h3>Luvas Rider</h3>
